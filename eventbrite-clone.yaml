openapi: 3.0.3
info:
  title: EventBrite-Like Platform API
  description: CMPE 202 Group Project - Event creation and ticketing platform
  version: 1.0.0

servers:
  - url: https://api.eventplatform.example.com/v1
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: array, items: {} }

    User:
      type: object
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        isAdmin: { type: boolean, description: "Only admins have moderation rights; all users can create and attend events" }
        createdAt: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        displayName: { type: string }

    Event:
      type: object
      properties:
        eventId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        categoryId: { type: string }
        startDateTime: { type: string, format: date-time }
        endDateTime: { type: string, format: date-time }
        location: { $ref: '#/components/schemas/Location' }
        capacity: { type: integer }
        status: { type: string, enum: [pending, approved, rejected] }
        organizerId: { type: string }
        imageUrl: { type: string }

    Location:
      type: object
      properties:
        type: { type: string, enum: [in-person, virtual] }
        address: { type: string }
        venueName: { type: string }

    TicketReceipt:
      type: object
      description: Ticket / receipt for an event registration
      properties:
        id:
          type: string
          description: Primary key for ticket/receipt
        eventId:
          type: string
          description: Foreign key to Event.id
        customerId:
          type: string
          description: Foreign key to User.id
        datePurchased:
          type: string
          format: date-time
        rsvpStatus:
          type: string
          enum: [pending, confirmed, canceled, attended]
        isEmailSent:
          type: boolean
      required:
        - id
        - eventId
        - customerId

paths:
  # ========== AUTH ==========
  /auth/register:
    post:
      summary: Register new user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201': { description: Created }
        '400': { description: Validation error }

  /auth/login:
    post:
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: OK, returns JWT }
        '401': { description: Invalid credentials }

  /auth/me:
    get:
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }

  # ========== EVENTS ==========
  /events:
    get:
      summary: List events (search, filter, paginate)
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: string }
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
        - name: location
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [date, popularity, distance] }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }

    post:
      summary: Create event
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title, startDateTime, endDateTime, location, capacity]
              properties:
                title: { type: string }
                description: { type: string }
                categoryId: { type: string }
                startDateTime: { type: string, format: date-time }
                endDateTime: { type: string, format: date-time }
                location: { $ref: '#/components/schemas/Location' }
                capacity: { type: integer }
                imageUrl: { type: string }
      responses:
        '201': { description: Created }
        '400': { description: Validation error }
        '403': { description: Forbidden }

  /events/{eventId}:
    get:
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: Not found }

    patch:
      summary: Update event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Event' }
      responses:
        '200': { description: OK }
        '403': { description: Forbidden }
        '404': { description: Not found }

    delete:
      summary: Delete event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }
        '403': { description: Forbidden }

  # ========== REGISTRATION ==========
  /events/{eventId}/register:
    post:
      summary: Register/RSVP for event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [attendeeEmail]
              properties:
                attendeeEmail: { type: string, format: email }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketReceipt'
        '400': { description: Event full or validation error }
        '404': { description: Event not found }

  # ========== ATTENDEE - MY REGISTRATIONS ==========
  /users/me/registrations:
    get:
      summary: List my registered events
      description: Returns all events the current user has registered for (RSVP'd or purchased tickets)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: rsvpStatus
          in: query
          schema:
            type: string
            enum: [pending, confirmed, canceled, attended]
          description: Filter by RSVP status
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketReceipt'
        '401': { description: Unauthorized }

  # ========== ORGANIZER ==========
  /organizers/events:
    get:
      summary: List my events
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /organizers/events/{eventId}/attendees:
    get:
      summary: List attendees
      security: [{ bearerAuth: [] }]
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }

  # ========== ADMIN ==========
  /admin/events/pending:
    get:
      summary: List pending events for approval
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /admin/events/{eventId}/approve:
    post:
      summary: Approve event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Approved }
        '403': { description: Forbidden }

  /admin/events/{eventId}/reject:
    post:
      summary: Reject event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200': { description: Rejected }

  # ========== CALENDAR ==========
  /events/{eventId}/calendar/google:
    get:
      summary: Get Google Calendar add URL
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }

  # ========== LOCATION ==========
  /events/nearby:
    get:
      summary: Events near location
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number }
        - name: lng
          in: query
          required: true
          schema: { type: number }
        - name: radius
          in: query
          schema: { type: number, default: 10 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }

  # ========== CATEGORIES ==========
  /categories:
    get:
      summary: List categories
      responses:
        '200': { description: OK }

  # ========== HEALTH ==========
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
