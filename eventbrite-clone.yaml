openapi: 3.1.0
info:
  title: Event Platform API
  description: Eventbrite-like platform for CMPE 202
  version: 1.0.0

servers:
  - url: https://api.eventplatform.com/v1

tags:
  - name: Auth
  - name: Events
  - name: Tickets
  - name: Categories
  - name: Organizer
  - name: Admin
  - name: Discovery
  - name: Calendar

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: string

    User:
      type: object
      required: [userId, email, displayName, role]
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
          enum: [attendee, organizer, admin]
        createdAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        categoryId:
          type: string
        name:
          type: string

    Location:
      type: object
      properties:
        type:
          type: string
          enum: [in-person, virtual]
        venueName:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    Event:
      type: object
      required: [eventId, title, startDateTime, endDateTime, capacity]
      properties:
        eventId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        categoryId:
          type: string
        organizerId:
          type: string
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        location:
          $ref: "#/components/schemas/Location"
        capacity:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
        imageUrl:
          type: string

    Ticket:
      type: object
      required: [ticketId, eventId, userId]
      properties:
        ticketId:
          type: string
        eventId:
          type: string
        userId:
          type: string
        rsvpStatus:
          type: string
          enum: [confirmed, canceled, attended]
        createdAt:
          type: string
          format: date-time

    PaginatedEvents:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/Event"

paths:

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                displayName:
                  type: string
      responses:
        "201":
          description: User created

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Returns JWT token

  /auth/me:
    get:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: Current user
      responses:
        "200":
          description: Logged-in user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /events:
    get:
      tags: [Discovery]
      summary: Discover events
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Paginated events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEvents"

    post:
      tags: [Events]
      summary: Create event
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Event"
      responses:
        "201":
          description: Event created

  /events/{eventId}:
    get:
      tags: [Events]
      summary: Event detail page
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}/tickets:
    post:
      tags: [Tickets]
      summary: Register / RSVP for event
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Ticket issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /users/me/tickets:
    get:
      tags: [Tickets]
      security:
        - bearerAuth: []
      summary: List my tickets
      responses:
        "200":
          description: User tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /organizer/events:
    get:
      tags: [Organizer]
      security:
        - bearerAuth: []
      summary: Events created by organizer
      responses:
        "200":
          description: Organizer events

  /organizer/events/{eventId}/attendees:
    get:
      tags: [Organizer]
      security:
        - bearerAuth: []
      summary: Attendee list
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attendees list

  /admin/events/pending:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Events awaiting moderation
      responses:
        "200":
          description: Pending events

  /admin/events/{eventId}/status:
    patch:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Approve or reject event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
                reason:
                  type: string
      responses:
        "200":
          description: Status updated

  /events/{eventId}/calendar/google:
    get:
      tags: [Calendar]
      summary: Generate Google Calendar link
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Calendar link generated

  /events/nearby:
    get:
      tags: [Discovery]
      summary: Discover events near location
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
        - name: lng
          in: query
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
        - name: radius
          in: query
          schema:
            type: number
            default: 10
      responses:
        "200":
          description: Nearby events

  /categories:
    get:
      tags: [Categories]
      summary: List event categories
      responses:
        "200":
          description: Categories list